body:
  text: 夫大聖善巧無方應機隨病非一迷之者守迹不知失體勤而歸宗未日故依理據教略製盤詩冀以執名之徒還歸無名之真源讀詩之法宜從中法為始盤迴屈曲乃至佛為終隨印道讀儼法師造死涅盤常共和是故界實寶殿窮坐生意如出盤理益行法意如捉巧實覺不智境中事利者嚴歸資糧善際正思大能昧冥得還莊家得以緣中便議賢仁三然器本寶隨分陀無道時雨普海印無隨際盡無尼羅得床心寶佛十別分生叵息妄想必不舊發益生滿虛空眾法佛為名動不來初成別隔亂雜不性餘境妙不守自十方一切塵中仍圓非真微無名性含即念一念亦即融知性極相無隨中是劫即一如相無所甚深絕寂緣塵無遠量無是互二智證切一來成微量劫九世十世相諸法不動本一一一即多切一即一一中多切一中
